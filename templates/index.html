<!DOCTYPE html>
<html>
<head>
    <title>ARIDAQ | RIBBON ANALYZER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background: #050505; color: #00FF41; font-family: 'Helvetica', sans-serif; margin: 0; overflow: hidden; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 320px; padding: 25px; background: rgba(0,0,0,0.9); height: 100vh; border-right: 1px solid #333; z-index: 10; }
        .label-tag { 
            position: absolute; background: rgba(0,255,65,0.2); border: 1px solid #00FF41;
            padding: 2px 6px; font-size: 10px; color: #fff; pointer-events: none; border-radius: 4px;
        }
        input, textarea { background: #111; border: 1px solid #333; color: #00FF41; width: 100%; margin-bottom: 15px; padding: 8px; }
        button { background: #00FF41; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #viewport { position: fixed; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="viewport"></div>
<div id="label-container"></div>

<div id="ui-overlay">
    <h2 style="color: #fff; font-size: 18px;">ARIDAQ PROTOCOL II</h2>
    <p style="font-size: 10px; color: #666;">BIOMOLECULAR FOLDING ENGINE</p>
    
    <label>PEPTIDE SEQUENCE</label>
    <textarea id="seq">MKTIIALSYIFCLVFAWREK</textarea>
    
    <label>pH LEVEL</label>
    <input type="number" id="ph" step="0.1" value="7.4">
    
    <label>SALT (M)</label>
    <input type="number" id="salt" step="0.01" value="0.15">
    
    <button onclick="runBio()">GENERATE RIBBON MOVIE</button>
</div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('viewport').appendChild(renderer.domElement);
    
    const molGroup = new THREE.Group();
    scene.add(molGroup);
    camera.position.z = 40;

    // Pro Lighting
    const light1 = new THREE.DirectionalLight(0xffffff, 1);
    light1.position.set(1, 1, 1);
    scene.add(light1);
    scene.add(new THREE.AmbientLight(0x333333));

    async function runBio() {
        const res = await fetch('/simulate_bio', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                sequence: document.getElementById('seq').value,
                ph: document.getElementById('ph').value,
                salt: document.getElementById('salt').value
            })
        });
        const data = await res.json();
        
        while(molGroup.children.length > 0) molGroup.remove(molGroup.children[0]);
        document.getElementById('label-container').innerHTML = "";

        const points = data.nodes.map(n => new THREE.Vector3(n.x, n.y, n.z));
        const curve = new THREE.CatmullRomCurve3(points);
        
        // --- Create Ribbon/Helix Structure ---
        const tubeGeo = new THREE.TubeGeometry(curve, 100, 0.8, 8, false);
        const material = new THREE.MeshPhongMaterial({ 
            vertexColors: true, 
            shininess: 100,
            side: THREE.DoubleSide
        });
        
        // Color coding based on potential (Blue to Red)
        const colors = [];
        data.nodes.forEach((n, i) => {
            const color = new THREE.Color();
            if (n.struct === "helix") color.setHex(0xff0044); // Red Helices
            else color.setHex(0x0066ff); // Blue Loops
            
            for(let j=0; j < (tubeGeo.attributes.position.count / data.nodes.length); j++) {
                colors.push(color.r, color.g, color.b);
            }
        });
        tubeGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        
        const ribbon = new THREE.Mesh(tubeGeo, material);
        molGroup.add(ribbon);

        // --- Add Tracking Labels ---
        data.nodes.forEach((n, i) => {
            if (i % 4 === 0) { // Label every 4th residue to keep it clean
                const div = document.createElement('div');
                div.className = 'label-tag';
                div.id = `label-${i}`;
                div.innerText = `${n.type}${i+1}`;
                document.getElementById('label-container').appendChild(div);
                n.element = div;
            }
        });

        const box = new THREE.Box3().setFromObject(molGroup);
        molGroup.position.sub(box.getCenter(new THREE.Vector3()));
        window.currentNodes = data.nodes;
    }

    function updateLabels() {
        if (!window.currentNodes) return;
        window.currentNodes.forEach(n => {
            if (n.element) {
                const vector = new THREE.Vector3(n.x + molGroup.position.x, n.y + molGroup.position.y, n.z + molGroup.position.z);
                vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = -(vector.y * 0.5 - 0.5) * window.innerHeight;
                n.element.style.transform = `translate(-50%, -50%) translate(${x}px,${y}px)`;
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        molGroup.rotation.y += 0.005;
        updateLabels();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
