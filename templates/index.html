<style>
    /* Add this to your existing styles */
    #console {
        background: #000;
        border: 1px solid #00FF41;
        height: 200px;
        overflow-y: scroll;
        padding: 10px;
        margin-top: 20px;
        font-size: 0.8em;
        text-align: left;
        color: #00FF41;
    }
    .glitch { animation: glitch 1s linear infinite; }
    @keyframes glitch {
        2%, 64% { transform: translate(2px, 0) skew(0deg); }
        4%, 60% { transform: translate(-2px, 0) skew(0deg); }
    }
</style>

<div class="container">
    <h1 class="glitch">ARIDAQ PROTOCOL v2.0</h1>
    <p>NODE INPUT: <input type="number" id="nodeCount" value="1000000"></p>
    <button onclick="executeProtocol()">RUN DEEP SCAN</button>
    
    <div id="console">
        <p>> SYSTEM IDLE...</p>
    </div>
</div>

<script>
    function executeProtocol() {
        const n = document.getElementById('nodeCount').value;
        const consoleBox = document.getElementById('console');
        consoleBox.innerHTML = ''; // Clear console

        // Use EventSource for the real-time "Stream"
        fetch('/solve', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({n: n})
        }).then(response => {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            function read() {
                reader.read().then(({done, value}) => {
                    if (done) return;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.replace('data: ', ''));
                            const p = document.createElement('p');
                            p.textContent = `> ${data.message || 'PROCESSING...'}`;
                            consoleBox.appendChild(p);
                            consoleBox.scrollTop = consoleBox.scrollHeight;
                        }
                    });
                    read();
                });
            }
            read();
        });
    }
</script>
